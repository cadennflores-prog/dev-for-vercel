<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Biology Report: Assignment 8</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #f4f7f6; }
        
        /* The Login Screen */
        #gate { 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; width: 100%; position: absolute; z-index: 10; background: #f4f7f6;
        }
        .card { 
            background: white; padding: 30px; border-radius: 10px; 
            border-top: 10px solid #27ae60; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center; width: 350px;
        }
        .tree { font-size: 60px; margin: 15px 0; }
        input { width: 90%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; text-align: center; }
        button { background: #27ae60; color: white; border: none; padding: 12px; width: 98%; border-radius: 5px; font-weight: bold; cursor: pointer; }
        
        /* The Secret Window */
        #secret-frame {
            display: none; width: 100%; height: 100vh; border: none;
        }
    </style>
</head>
<body>

    <div id="gate">
        <div class="card">
            <h1 style="color:#27ae60; font-size: 20px;">Assignment 8: Biome Study</h1>
            <p style="font-size: 11px; color: #999;">Research Node: Amazonia-047</p>
            <div class="tree">🎄</div>
            <p style="font-size: 14px;">Enter <b>Peer Review Token</b> to access simulation.</p>
            <input type="password" id="token" placeholder="Token ID">
            <button onclick="unlock()">DECRYPT DATA</button>
        </div>
    </div>

    <iframe id="secret-frame" src=""></iframe>

    <script>
        function unlock() {
            var pass = document.getElementById('token').value;
            if (pass === "tree77") {
                // 1. Put your NEW Canva URL here:
                document.getElementById('secret-frame').src = "https://my-mc-launcher.my.canva.site/research-archive-047";
                
                // 2. Hide the login card and show the game site
                document.getElementById('gate').style.display = "none";
                document.getElementById('secret-frame').style.display = "block";
            } else {
                alert("Invalid Token.");
                document.getElementById('token').value = "";
            }
        }
    </script>

</body>
</html>
