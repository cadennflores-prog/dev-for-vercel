<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Biologia - Tarefa 8</title>
    <style>
        /* This centers everything perfectly */
        body { 
            background-color: #f4f7f6; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            font-family: sans-serif;
        }
        /* This is your white box with the green top */
        .card { 
            background: white; 
            padding: 30px; 
            border-radius: 10px; 
            border-top: 10px solid #27ae60; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
            width: 350px;
        }
        h1 { color: #27ae60; font-size: 20px; margin-bottom: 5px; }
        .tree { font-size: 50px; margin: 15px 0; }
        input { 
            width: 90%; 
            padding: 10px; 
            margin: 10px 0; 
            border: 1px solid #ddd; 
            border-radius: 5px;
            text-align: center;
        }
        button { 
            background: #27ae60; 
            color: white; 
            border: none; 
            padding: 12px; 
            width: 97%; 
            border-radius: 5px; 
            font-weight: bold; 
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>TAREFA 8: BIOMA</h1>
        <p style="font-size: 12px; color: grey;">Portal de Submissão</p>
        
        <div class="tree">🎄</div>
        
        <p>Insira o Token ID para descriptografar os logs.</p>
        
        <input type="password" id="token" placeholder="Token ID">
        <br>
        <button onclick="check()">ENVIAR DADOS</button>
        
        <p id="msg" style="font-size: 10px; color: #888; margin-top: 15px;">CONEXÃO SEGURA</p>
    </div>

    <script>
        function check() {
            var pass = document.getElementById('token').value;
            if (pass === "tree77") {
                document.getElementById('msg').innerText = "REDIRECIONANDO...";
                // Your new secret Canva link goes here:
                window.location.href = 'https://my-mc-launcher.my.canva.site/projeto-setor-77';
            } else {
                alert("Token incorreto.");
            }
        }
    </script>

</body>
</html>
